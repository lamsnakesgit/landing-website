<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 320px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
        }

        h3 {
            margin-top: 0;
            color: #075e54;
            text-align: center;
        }

        textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        button:hover {
            background: #128C7E;
        }

        #status {
            margin-top: 10px;
            font-size: 13px;
            color: #555;
            text-align: center;
        }
    </style>
</head>

<body>
    <h3>🚀 WA Fast Sender</h3>
    <label for="numbers">Номера (по одному на строку, с кодом):</label>
    <textarea id="numbers" rows="5" placeholder="79991234567&#10;79997654321"></textarea>

    <label for="msg">Сообщение:</label>
    <textarea id="msg" rows="3" placeholder="Привет! Это тестовое сообщение."></textarea>

    <button id="start">Запустить рассылку</button>
    <div id="status">Откройте вкладку WhatsApp Web</div>

    <script src="popup.js"></script>
</body>

</html>
